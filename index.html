/* ---------------- Statistiques ---------------- */
const GENRE_NAMES = {
  28: 'Action', 12: 'Aventure', 16: 'Animation', 35: 'Comédie', 80: 'Crime',
  99: 'Documentaire', 18: 'Drame', 10751: 'Familial', 14: 'Fantastique',
  36: 'Histoire', 27: 'Horreur', 10402: 'Musique', 9648: 'Mystère',
  10749: 'Romance', 878: 'Science-Fiction', 10770: 'Téléfilm', 53: 'Thriller',
  10752: 'Guerre', 37: 'Western', 10759: 'Action & Aventure', 10762: 'Enfants',
  10763: 'Actualités', 10764: 'Télé-réalité', 10765: 'SF & Fantastique',
  10766: 'Feuilleton', 10767: 'Talk-show', 10768: 'Guerre & Politique',
};
const MOIS = ['janv', 'févr', 'mars', 'avr', 'mai', 'juin', 'juil', 'août', 'sept', 'oct', 'nov', 'déc'];

let statsOpen = false;

/* Complète les genres manquants (une fois, résultats mémorisés) */
async function backfillGenres(cb) {
  if (!tmdbKey()) return;
  const targets = [];
  for (const s of state.series) {
    const m = state.tmdb[s.uuid];
    if (m && m.provider === 'tmdb' && m.id && !m.genres) targets.push({ meta: m, type: 'tv' });
  }
  for (const mv of state.movies) {
    if (!mv.is_watched) continue;
    const m = state.tmdb[mv.uuid];
    if (m && m.provider === 'tmdb' && m.id && !m.genres) targets.push({ meta: m, type: 'movie' });
  }
  const batch = targets.slice(0, 80);
  if (!batch.length) return;
  await Promise.all(batch.map(t => pool(async () => {
    try {
      const d = await tget(`/${t.type}/${t.meta.id}`);
      t.meta.genres = (d.genres || []).map(g => g.id);
      await saveMeta(t.meta);
    } catch (e) {}
  })));
  cb && cb();
}

function openStats() {
  statsOpen = true;
  renderStats();
  backfillGenres(() => { if (statsOpen) renderStats(); });
}

function renderStats() {
  // événements datés (dates réelles de visionnage)
  const events = [];
  let epCount = 0;
  for (const s of state.series)
    for (const sea of s.seasons || [])
      for (const ep of sea.episodes)
        if (ep.is_watched) { epCount++; if (ep.watched_at) events.push({ d: ep.watched_at.slice(0, 10), t: 'ep' }); }
  const mvWatched = state.movies.filter(m => m.is_watched);
  for (const m of mvWatched) if (m.watched_at) events.push({ d: m.watched_at.slice(0, 10), t: 'mv' });

  // 12 derniers mois
  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`, lab: MOIS[d.getMonth()], ep: 0, mv: 0 });
  }
  const mIdx = Object.fromEntries(months.map((m, i) => [m.key, i]));
  const perDay = {};
  for (const e of events) perDay[e.d] = (perDay[e.d] || 0) + 1;
  // les journées à +48 épisodes sont du cochage en masse (création du compte
  // TV Time, « tout vu » sur de vieilles séries), pas du vrai visionnage
  const bulk = new Set(Object.keys(perDay).filter(d => perDay[d] > 48));
  const days = [0, 0, 0, 0, 0, 0, 0];
  for (const e of events) {
    const mk = e.d.slice(0, 7);
    if (mk in mIdx) months[mIdx[mk]][e.t]++;
    if (!bulk.has(e.d)) days[(new Date(e.d).getDay() + 6) % 7]++;
  }
  const maxM = Math.max(1, ...months.map(m => m.ep + m.mv));
  const maxD = Math.max(1, ...days);
  let recDay = null, recN = 0;
  for (const [d, n] of Object.entries(perDay)) if (!bulk.has(d) && n > recN) { recN = n; recDay = d; }

  // temps estimé
  const minutes = epCount * 40 + mvWatched.length * 110;
  const heures = Math.round(minutes / 60);

  // genres (épisodes vus pondèrent les séries, un film compte 2)
  const gcount = {};
  for (const s of state.series) {
    const m = state.tmdb[s.uuid];
    if (!m || !m.genres) continue;
    const w = progress(s).watched;
    if (!w) continue;
    for (const g of m.genres) gcount[g] = (gcount[g] || 0) + w;
  }
  for (const mv of mvWatched) {
    const m = state.tmdb[mv.uuid];
    if (!m || !m.genres) continue;
    for (const g of m.genres) gcount[g] = (gcount[g] || 0) + 2;
  }
  const topG = Object.entries(gcount).filter(([g]) => GENRE_NAMES[g]).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const maxG = Math.max(1, ...topG.map(x => x[1]));

  // top séries par épisodes vus
  const topS = state.series.map(s => ({ s, w: progress(s).watched })).filter(x => x.w > 0)
    .sort((a, b) => b.w - a.w).slice(0, 5);
  const maxS = Math.max(1, ...topS.map(x => x.w));

  const barChart = (cols, max, small) => `
    <div class="chart ${small ? 'small' : ''}">
      ${cols.map(c => `<div class="ccol" title="${c.title || ''}">
        <div class="bars">
          ${c.mv ? `<span class="seg mv" style="height:${c.mv / max * 100}%"></span>` : ''}
          ${c.ep ? `<span class="seg ep" style="height:${c.ep / max * 100}%"></span>` : ''}
        </div>
        <span class="clab">${c.lab}</span>
      </div>`).join('')}
    </div>`;

  $('#overlay-root').innerHTML = `
  <div class="overlay">
    <div class="detbar">
      <button class="iconbtn" data-action="close-stats">${ICONS.back}</button>
      <span class="t" style="flex:1;font-weight:700">📊 Statistiques</span>
    </div>
    <main style="padding-top:4px">
      <div class="panel">
        <div class="statgrid">
          <div class="stat"><div class="v">${epCount.toLocaleString('fr-FR')}</div><div class="l">épisodes vus</div></div>
          <div class="stat"><div class="v">${mvWatched.length.toLocaleString('fr-FR')}</div><div class="l">films vus</div></div>
          <div class="stat"><div class="v">≈ ${heures.toLocaleString('fr-FR')} h</div><div class="l">devant l'écran*</div></div>
          <div class="stat"><div class="v">${recN}</div><div class="l">record en 1 jour${recDay ? '<br>' + fmtDate(recDay) : ''}</div></div>
        </div>
        <p style="margin:10px 0 0;font-size:11px;color:var(--txt2)">* estimation : 40 min/épisode, 1h50/film</p>
      </div>

      <div class="panel">
        <h3>📅 Activité des 12 derniers mois</h3>
        ${barChart(months.map(m => ({ ...m, title: `${m.lab} : ${m.ep} ép. + ${m.mv} films` })), maxM)}
        <div class="legend">
          <span><span class="dot" style="background:var(--acc)"></span>Épisodes</span>
          <span><span class="dot" style="background:#f97316"></span>Films</span>
        </div>
      </div>

      <div class="panel">
        <h3>🗓️ Par jour de la semaine</h3>
        ${barChart(['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map((lab, i) =>
          ({ lab, ep: days[i], mv: 0, title: `${lab} : ${days[i]}` })), maxD, true)}
      </div>

      <div class="panel">
        <h3>🎭 Tes genres favoris</h3>
        ${topG.length ? topG.map(([g, n]) => `
          <div class="grow">
            <span class="gl">${GENRE_NAMES[g]}</span>
            <span class="gb"><i style="width:${n / maxG * 100}%"></i></span>
            <span class="gv">${n}</span>
          </div>`).join('')
          : `<p style="color:var(--txt2);font-size:13px">Analyse en cours… <span class="spin"></span></p>`}
      </div>

      <div class="panel">
        <h3>🏅 Tes séries les plus regardées</h3>
        ${topS.map(({ s, w }) => `
          <div class="grow" data-action="open-series" data-uuid="${s.uuid}">
            <span class="gl">${esc(s.title)}</span>
            <span class="gb"><i style="width:${w / maxS * 100}%"></i></span>
            <span class="gv">${w} ép.</span>
          </div>`).join('')}
      </div>
    </main>
  </div>`;
}

/* ---------------- Vue détail série ---------------- */
let detailUuid = null;

function openSeries(uuid) {
  detailUuid = uuid;
  renderDetail();
  const s = state.series.find(x => x.uuid === uuid);
  if (s && metaNeedsFetch(s, 'tv')) {
    pool(() => resolveMeta(s, 'tv')).then(() => { if (detailUuid === uuid) renderDetail(); }).catch(() => {});
  }
}
function closeDetail() {
  detailUuid = null;
  if (statsOpen) { renderStats(); return; } // retour aux statistiques
  $('#overlay-root').innerHTML = '';
  render();
}

function renderDetail() {
  const s = state.series.find(x => x.uuid === detailUuid);
  if (!s) return closeDetail();
  const meta = state.tmdb[s.uuid] || {};
  const p = progress(s);
  const pct = p.total ? Math.round(p.watched / p.total * 100) : 0;
  const seasons = sortedSeasons(s).filter(x => !x.is_specials && x.number !== 0);
  const nx = nextUnwatched(s);
  const bg = meta.backdrop || meta.posterBig;
  $('#overlay-root').innerHTML = `
  <div class="overlay">
    <div class="detbar">
      <button class="iconbtn" data-action="close-detail">${ICONS.back}</button>
      <span style="flex:1"></span>
      <button class="iconbtn" data-action="refresh-one" title="Actualiser cette série">${ICONS.refresh}</button>
    </div>
    <div class="backdrop" ${bg ? `style="background-image:url('${bg}')"` : ''}></div>
    <div class="dethead">
      ${posterHtml(s, 'tv', true)}
      <div class="info">
        <h2>${esc(s.title)}</h2>
        <div class="meta">
          <span class="badge ${s.status === 'up_to_date' ? 'ok' : s.status === 'stopped' ? '' : 'acc'}">${STATUS_LABEL[s.status] || ''}</span>
          ${meta.tvStatus === 'Ended' || meta.tvStatus === 'Canceled' ? '<span class="badge">Série terminée</span>' : ''}
          ${s.is_favorite ? '<span class="badge warn">★ Favori</span>' : ''}
        </div>
        <div class="meta">${p.watched} / ${p.total} épisodes vus (${pct}%)</div>
        ${meta.nextEp ? `<div class="meta">📅 ${epCode(meta.nextEp.season, meta.nextEp.episode)} le ${fmtDate(meta.nextEp.date)}</div>` : ''}
        <div class="progress ${pct === 100 ? 'full' : ''}" style="margin-top:10px;max-width:160px"><i style="width:${pct}%"></i></div>
      </div>
    </div>
    ${meta.overview ? `<p class="overview clamp" data-action="expand-overview">${esc(meta.overview)}</p>` : ''}
    <div class="detactions">
      ${nx && !isFuture(nx.ep) ? `<button class="btn small" data-action="mark-next" data-uuid="${s.uuid}" data-stay="1">${ICONS.check} Vu ${epCode(nx.season, nx.ep.number)}</button>` : ''}
      <button class="btn ghost small" data-action="toggle-fav">${s.is_favorite ? '★ Favori' : '☆ Favori'}</button>
      <button class="btn ghost small" data-action="toggle-stop">${s.status === 'stopped' ? '▶ Reprendre' : '⏸ Arrêter'}</button>
      <button class="btn danger small" data-action="delete-series">Supprimer</button>
    </div>
    ${seasons.map(sea => {
      const eps = sea.episodes.filter(e => !e.special).sort((a, b) => a.number - b.number);
      const w = eps.filter(e => e.is_watched).length;
      const open = nx && nx.season === sea.number;
      return `<details class="season" ${open ? 'open' : ''}>
        <summary>
          <span class="arrow">${ICONS.chevron}</span>
          <span class="n">Saison ${sea.number}</span>
          <span class="cnt">${w}/${eps.length}</span>
          <button class="btn ghost small seasonbtn" data-action="mark-season" data-season="${sea.number}" data-watched="${w < eps.length ? 1 : 0}">
            ${w < eps.length ? 'Tout vu' : 'Tout dévu'}
          </button>
        </summary>
        ${eps.map(ep => `
          <div class="eprow ${ep.is_watched ? 'watched' : ''} ${isFuture(ep) ? 'future' : ''}"
               data-action="toggle-ep" data-season="${sea.number}" data-ep="${ep.number}">
            <span class="num">${pad2(ep.number)}</span>
            <span class="nm">${esc(ep.name || 'Épisode ' + ep.number)}
              ${isFuture(ep) ? `<span class="d">· le ${fmtDate(ep.air_date)}</span>`
                : ep.watched_at ? `<span class="d">· vu le ${fmtDate(ep.watched_at)}</span>` : ''}
            </span>
            <span class="epcheck">${ICONS.check}</span>
          </div>`).join('')}
      </details>`;
    }).join('')}
  </div>`;
  loadVisiblePosters();
}

/* ---------------- Modale Découvrir ---------------- */
function openDiscoverModal(n) {
  const lib = inLibrary(n);
  $('#modal-root').innerHTML = `
  <div class="modal-bg" data-action="close-modal">
    <div class="modal">
      <div class="grab"></div>
      <div class="dmodal">
        <div class="poster">${n.poster ? `<img src="${n.poster}" alt="">` : esc(initials(n.title))}</div>
        <div class="dmi">
          <h3>${esc(n.title)}</h3>
          <div class="y">${n.year || ''} · ${n.type === 'tv' ? 'Série' : 'Film'}${n.rating ? ` · <span style="color:var(--warn)">★ ${n.rating.toFixed(1)}</span>` : ''}</div>
          ${lib
            ? `<span class="badge ok">✓ Déjà dans ta bibliothèque</span>`
            : n.type === 'movie'
              ? `<div style="display:flex;gap:8px;flex-wrap:wrap">
                   <button class="btn small" data-action="add-discover" data-key="${esc(JSON.stringify(n)).replace(/"/g, '&quot;')}">${ICONS.plus} À voir</button>
                   <button class="btn ghost small" data-action="add-discover-watched" data-key="${esc(JSON.stringify(n)).replace(/"/g, '&quot;')}">${ICONS.check} Vu</button>
                 </div>`
              : `<button class="btn small" data-action="add-discover" data-key="${esc(JSON.stringify(n)).replace(/"/g, '&quot;')}">${ICONS.plus} Ajouter</button>`}
        </div>
      </div>
      <div id="modal-extra"><div class="loadrow" style="text-align:left;padding:10px 0"><span class="spin"></span></div></div>
      ${n.overview ? `<p style="margin-top:6px;color:var(--txt2);font-size:13.5px">${esc(n.overview)}</p>` : ''}
    </div>
  </div>`;
  enrichModal(n);
}

/* Détails supplémentaires de la fiche : note, genres, durée, casting */
async function enrichModal(n) {
  const box = () => $('#modal-extra');
  try {
    let html = '';
    if (n.provider === 'tmdb' && tmdbKey()) {
      const d = await tget(`/${n.type === 'tv' ? 'tv' : 'movie'}/${n.provId}`, { append_to_response: 'credits' });
      const parts = [];
      if (d.vote_average) parts.push(`<span class="badge warn">★ ${d.vote_average.toFixed(1)}/10</span> <span style="color:var(--txt2);font-size:12px">(${d.vote_count.toLocaleString('fr-FR')} votes)</span>`);
      const genres = (d.genres || []).map(g => `<span class="badge">${esc(g.name)}</span>`).join(' ');
      if (genres) parts.push(genres);
      if (n.type === 'movie' && d.runtime) parts.push(`<span class="badge acc">${Math.floor(d.runtime / 60)}h${pad2(d.runtime % 60)}</span>`);
      if (n.type === 'tv' && d.number_of_seasons) parts.push(`<span class="badge acc">${d.number_of_seasons} saison(s) · ${d.number_of_episodes} épisodes</span>`);
      const cast = ((d.credits && d.credits.cast) || []).slice(0, 5).map(c => c.name);
      const director = ((d.credits && d.credits.crew) || []).find(c => c.job === 'Director');
      html = `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:12px">${parts.join(' ')}</div>
        ${cast.length ? `<p style="margin-top:10px;font-size:12.5px;color:var(--txt2)"><b style="color:var(--txt)">Avec :</b> ${esc(cast.join(', '))}</p>` : ''}
        ${director ? `<p style="margin-top:4px;font-size:12.5px;color:var(--txt2)"><b style="color:var(--txt)">Réalisé par :</b> ${esc(director.name)}</p>` : ''}`;
    } else if (n.provider === 'tvmaze') {
      const [show, cast] = await Promise.all([
        jget(`${TVMAZE}/shows/${n.provId}`),
        jget(`${TVMAZE}/shows/${n.provId}/cast`).catch(() => []),
      ]);
      const parts = [];
      if (show.rating && show.rating.average) parts.push(`<span class="badge warn">★ ${show.rating.average.toFixed(1)}/10</span>`);
      parts.push((show.genres || []).map(g => `<span class="badge">${esc(g)}</span>`).join(' '));
      const actors = (cast || []).slice(0, 5).map(c => c.person && c.person.name).filter(Boolean);
      html = `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:12px">${parts.join(' ')}</div>
        ${actors.length ? `<p style="margin-top:10px;font-size:12.5px;color:var(--txt2)"><b style="color:var(--txt)">Avec :</b> ${esc(actors.join(', '))}</p>` : ''}`;
    }
    if (box()) box().innerHTML = html;
  } catch (e) {
    if (box()) box().innerHTML = '';
  }
}

/* ---------------- Événements ---------------- */
document.querySelectorAll('nav.tabs button').forEach((b, i) => {
  b.querySelector('.nico').innerHTML = [ICONS.tv, ICONS.play, ICONS.compass, ICONS.film, ICONS.gear][i];
  b.addEventListener('click', () => setTab(b.dataset.tab));
});
$('#btn-add').innerHTML = ICONS.plus;
$('#btn-refresh').innerHTML = ICONS.refresh;
$('#btn-add').addEventListener('click', () => {
  setTab('discover');
  setTimeout(() => { const i = $('#discover-search'); if (i) i.focus(); }, 60);
});
$('#btn-refresh').addEventListener('click', refreshAll);

let discoverTimer = null;
document.body.addEventListener('input', e => {
  if (e.target.id === 'series-search') { state.seriesSearch = e.target.value; renderKeepFocus('series-search'); }
  if (e.target.id === 'movie-search') { state.movieSearch = e.target.value; renderKeepFocus('movie-search'); }
  if (e.target.id === 'discover-search') {
    state.discoverSearch = e.target.value;
    clearTimeout(discoverTimer);
    const q = e.target.value.trim();
    if (q.length < 2) { state.discoverResults = null; state.discoverLoading = false; renderKeepFocus('discover-search'); return; }
    state.discoverLoading = true;
    renderKeepFocus('discover-search');
    discoverTimer = setTimeout(async () => {
      try { state.discoverResults = await searchDiscover(q); }
      catch (err) { state.discoverResults = []; toast('Erreur de recherche : ' + err.message); }
      state.discoverLoading = false;
      renderKeepFocus('discover-search');
    }, 420);
  }
});
function renderKeepFocus(id) {
  const el0 = $('#' + id);
  const pos = el0 ? el0.selectionStart : 0;
  render();
  const el = $('#' + id);
  if (el) { el.focus(); el.setSelectionRange(pos, pos); }
}

document.body.addEventListener('change', e => {
  if (e.target.dataset.action === 'import-files' && e.target.files.length) handleFiles([...e.target.files]);
  if (e.target.classList.contains('fsel')) {
    const f = e.target.dataset.f;
    const v = e.target.value;
    state.dFilters[f] = (f === 'genre' || f === 'note') ? +v : v;
    render();
  }
});

document.body.addEventListener('click', async e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const act = el.dataset.action;
  const s = detailUuid ? state.series.find(x => x.uuid === detailUuid) : null;

  if (act === 'series-filter') { state.seriesFilter = el.dataset.f; state.seriesSearch = ''; render(); }
  else if (act === 'movie-filter') { state.movieFilter = el.dataset.f; state.movieSearch = ''; render(); }
  else if (act === 'open-series') openSeries(el.dataset.uuid);
  else if (act === 'close-detail') closeDetail();
  else if (act === 'close-modal') { if (e.target === el) $('#modal-root').innerHTML = ''; }
  else if (act === 'expand-overview') el.classList.toggle('clamp');
  else if (act === 'discover-tab') { state.discoverTab = el.dataset.k; render(); }
  else if (act === 'discover-genre') { state.genreSel = +el.dataset.g; render(); }
  else if (act === 'discover-detail') openDiscoverModal(JSON.parse(el.dataset.key));
  else if (act === 'add-discover') { $('#modal-root').innerHTML = ''; addItem(JSON.parse(el.dataset.key)); }
  else if (act === 'add-discover-watched') { $('#modal-root').innerHTML = ''; addItem(JSON.parse(el.dataset.key), true); }
  else if (act === 'quick-add') addItem(JSON.parse(el.dataset.key));
  else if (act === 'open-movie') openMovieModal(el.dataset.uuid);
  else if (act === 'open-stats') openStats();
  else if (act === 'close-stats') { statsOpen = false; $('#overlay-root').innerHTML = ''; }
  else if (act === 'movie-watch') {
    const m = state.movies.find(x => x.uuid === el.dataset.uuid);
    if (m) { await toggleMovieWatched(m); openMovieModal(m.uuid); render(); }
  }
  else if (act === 'movie-fav') {
    const m = state.movies.find(x => x.uuid === el.dataset.uuid);
    if (m) { m.is_favorite = !m.is_favorite; await saveMovie(m); openMovieModal(m.uuid); render(); }
  }
  else if (act === 'movie-del') {
    const m = state.movies.find(x => x.uuid === el.dataset.uuid);
    if (m && confirm(`Supprimer « ${m.title} » de ta collection ?`)) {
      state.movies = state.movies.filter(x => x.uuid !== m.uuid);
      delete state.tmdb[m.uuid];
      await DB.del('movies', m.uuid);
      await DB.del('tmdb', m.uuid);
      $('#modal-root').innerHTML = '';
      render();
    }
  }
  else if (act === 'mark-next') {
    e.stopPropagation();
    const target = state.series.find(x => x.uuid === el.dataset.uuid);
    if (target) { await markNext(target); el.dataset.stay ? renderDetail() : render(); }
  }
  else if (act === 'toggle-movie') {
    e.stopPropagation();
    const m = state.movies.find(x => x.uuid === el.dataset.uuid);
    if (m) {
      await toggleMovieWatched(m);
      // mise à jour sur place : pas de re-rendu, la liste ne bouge pas
      const card = el.closest('.mcard');
      if (card) card.classList.toggle('watched', m.is_watched);
      el.title = m.is_watched ? 'Vu' : 'Marquer vu';
    }
  }
  else if (act === 'toggle-ep' && s) { await toggleEpisode(s, +el.dataset.season, +el.dataset.ep); renderDetail(); }
  else if (act === 'mark-season' && s) {
    e.preventDefault(); e.stopPropagation();
    await markSeason(s, +el.dataset.season, el.dataset.watched === '1');
    renderDetail();
  }
  else if (act === 'toggle-fav' && s) { s.is_favorite = !s.is_favorite; await saveSeries(s); renderDetail(); }
  else if (act === 'toggle-stop' && s) {
    if (s.status === 'stopped') { s.status = 'continuing'; autoStatus(s); }
    else s.status = 'stopped';
    await saveSeries(s); renderDetail();
  }
  else if (act === 'delete-series' && s) {
    if (confirm(`Supprimer « ${s.title} » et tout son historique ?`)) {
      state.series = state.series.filter(x => x.uuid !== s.uuid);
      delete state.tmdb[s.uuid];
      await DB.del('series', s.uuid);
      await DB.del('tmdb', s.uuid);
      closeDetail();
    }
  }
  else if (act === 'refresh-one' && s) {
    el.innerHTML = '<span class="spin"></span>';
    try {
      const r = await refreshSeries(s, true);
      toast(r.found ? (r.added ? `${r.added} nouvel(s) épisode(s) ajouté(s)` : 'Série à jour ✓') : 'Série introuvable chez le fournisseur');
    } catch (err) { toast('Erreur : ' + err.message); }
    renderDetail();
  }
  else if (act === 'save-key') {
    state.settings.tmdbKey = $('#tmdb-key').value.trim();
    await saveSettings();
    state.trending = null;
    if (!tmdbKey()) { $('#key-status').textContent = 'ℹ️ Sans clé : affiches via TVMaze / iTunes'; return; }
    $('#key-status').innerHTML = '<span class="spin"></span> Vérification…';
    try {
      await tget('/configuration');
      $('#key-status').textContent = '✅ Clé valide et enregistrée';
      toast('Clé TMDB enregistrée ✓');
    } catch (err) {
      $('#key-status').textContent = '❌ ' + err.message;
    }
  }
  else if (act === 'export-series') download(`mes-series-backup-${new Date().toISOString().slice(0, 10)}.json`, state.series);
  else if (act === 'export-movies') download(`mes-films-backup-${new Date().toISOString().slice(0, 10)}.json`, state.movies);
  else if (act === 'clear-all') {
    if (confirm('Effacer TOUTES les données de l’application ? Cette action est irréversible.')) {
      await DB.clear('series'); await DB.clear('movies'); await DB.clear('tmdb');
      state.series = []; state.movies = []; state.tmdb = {};
      toast('Données effacées');
      render();
    }
  }
});

function afterRender() { loadVisiblePosters(); }

/* ---------------- Démarrage ---------------- */
(async function init() {
  await DB.open();
  const [series, movies, tmdb, settings, lastRefresh] = await Promise.all([
    DB.getAll('series'), DB.getAll('movies'), DB.getAll('tmdb'),
    DB.kvGet('settings'), DB.kvGet('lastRefresh'),
  ]);
  state.series = series || [];
  state.movies = movies || [];
  state.settings = settings || {};
  state.lastRefresh = lastRefresh || null;
  for (const t of tmdb || []) state.tmdb[t.uuid] = t;
  render();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
